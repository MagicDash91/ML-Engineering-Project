global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Airflow metrics (when available)
  - job_name: 'airflow'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: '/admin/metrics'
    scrape_interval: 30s

  # Custom application metrics
  - job_name: 'churn-pipeline-metrics'
    static_configs:
      - targets: ['astro-airflow_ca19d0-scheduler-1:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Kafka JMX metrics
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
    scrape_interval: 30s

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s