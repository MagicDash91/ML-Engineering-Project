name: 'dbt_churn'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'dbt_churn'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Configuring models
models:
  dbt_churn:
    # Config indicated by + and applies to all files under models/staging/
    staging:
      +materialized: view
      +schema: staging
    # Config indicated by + and applies to all files under models/intermediate/  
    intermediate:
      +materialized: view
      +schema: intermediate
    # Config indicated by + and applies to all files under models/marts/
    marts:
      +materialized: table
      +schema: marts

vars:
  # Raw data schema
  raw_schema: PUBLIC
  raw_database: DATABASE